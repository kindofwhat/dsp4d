# DSP4D - Core AI Services Configuration

# Application Info
quarkus.application.name=dsp4d-core
quarkus.application.version=1.0.0-SNAPSHOT

# ===================================================================
# LLM Provider Configuration
# Switch providers by uncommenting the desired section and setting
# the appropriate profile: -Dquarkus.profile=ollama|openai|huggingface
# ===================================================================

# --- Ollama Provider (Local, Default) ---
# Requires Ollama running locally: https://ollama.ai/
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.timeout=60s

# Default model for Ollama (research focus: 1B, 3B, 7B, 13B models)
# Options: llama3.2:1b, llama3.2:3b, llama3.2:7b, llama3.2:13b, mistral, phi3
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2:3b
quarkus.langchain4j.ollama.chat-model.temperature=0.7
quarkus.langchain4j.ollama.chat-model.max-tokens=2048

# --- OpenAI Provider (Uncomment to use) ---
# Requires API key: export QUARKUS_LANGCHAIN4J_OPENAI_API_KEY=sk-...
# quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:}
# quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
# quarkus.langchain4j.openai.chat-model.temperature=0.7
# quarkus.langchain4j.openai.chat-model.max-tokens=2048
# quarkus.langchain4j.openai.timeout=60s

# --- Hugging Face Provider (Uncomment to use) ---
# Requires API token: export QUARKUS_LANGCHAIN4J_HUGGINGFACE_API_KEY=hf_...
# quarkus.langchain4j.huggingface.api-key=${HUGGINGFACE_API_KEY:}
# quarkus.langchain4j.huggingface.chat-model.model-id=meta-llama/Llama-3.2-3B-Instruct
# quarkus.langchain4j.huggingface.timeout=60s

# ===================================================================
# LangChain4j Logging (useful for debugging)
# ===================================================================
quarkus.langchain4j.log-requests=false
quarkus.langchain4j.log-responses=false

# ===================================================================
# Research-specific Configuration
# ===================================================================
# Enable detailed metrics for model evaluation
dsp4d.evaluation.metrics.enabled=true
dsp4d.evaluation.golden-dataset.path=../evaluation/golden-datasets/medical

# Data sovereignty settings
dsp4d.security.local-only=true
dsp4d.security.data-retention.days=0

# Logging
quarkus.log.level=INFO
quarkus.log.category."ch.bfh.dsp4d".level=DEBUG
