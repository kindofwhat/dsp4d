# ===================================================================
# Shared LLM Provider Configuration
# Used by both llm-api and llm-cli modules
# ===================================================================

# LLM Provider Configuration
# Specify which provider to use when multiple are available
quarkus.langchain4j.chat-model.provider=openai

# For local Ollama (default):
# Uncomment these lines and comment out the OpenAI section below
# Also change provider to: quarkus.langchain4j.chat-model.provider=ollama
#quarkus.langchain4j.ollama.base-url=http://localhost:11434
#quarkus.langchain4j.ollama.timeout=60s
#quarkus.langchain4j.ollama.chat-model.model-id=llama3.2:3b
#quarkus.langchain4j.ollama.chat-model.temperature=0.7
#quarkus.langchain4j.ollama.chat-model.max-tokens=2048

# For OpenAI-compatible endpoints (like https://ai.bniweb.ch):
# This works with any OpenAI-compatible API
# Note: Your endpoint uses /api/v1/chat/completions (with /api prefix)
quarkus.langchain4j.openai.base-url=${OLLAMA_URL:http://localhost:11434}/api
quarkus.langchain4j.openai.api-key=${OLLAMA_API_KEY:}
quarkus.langchain4j.openai.timeout=60s
quarkus.langchain4j.openai.chat-model.model-name=${OLLAMA_MODEL:llama3.2:3b}
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.chat-model.max-tokens=2048

# Bean Discovery - Multi-module support
quarkus.index-dependency.llm-core.group-id=ch.bfh.dsp4d
quarkus.index-dependency.llm-core.artifact-id=llm-core

# Logging
quarkus.log.level=INFO
quarkus.log.category."ch.bfh.dsp4d".level=DEBUG
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG

# Development Settings
%dev.quarkus.langchain4j.log-requests=true
%dev.quarkus.langchain4j.log-responses=true

# Log startup config to verify .env is loaded
%dev.quarkus.log.category."io.quarkus.runtime.configuration".level=DEBUG

# Enable HTTP client logging to see exact requests
%dev.quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
%dev.quarkus.rest-client.logging.scope=request-response
%dev.quarkus.rest-client.logging.body-limit=1000

# Production Settings
%prod.quarkus.log.level=INFO
%prod.quarkus.langchain4j.log-requests=false
%prod.quarkus.langchain4j.log-responses=false
