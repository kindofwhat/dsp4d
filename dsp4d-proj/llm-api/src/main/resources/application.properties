# DSP4D - REST API Configuration

# ===================================================================
# Import Shared Configuration
# ===================================================================
quarkus.config.locations=../shared-config/application-shared.properties

# ===================================================================
# API-Specific Settings
# ===================================================================
# Application Info
quarkus.application.name=dsp4d-api
quarkus.http.port=8080

# ===================================================================
# REST Configuration
# ===================================================================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:8080
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# ===================================================================
# OpenAPI / Swagger UI
# ===================================================================
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# API Documentation
mp.openapi.extensions.smallrye.info.title=DSP4D - LLM Evaluation API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API for testing and evaluating LLM models for sensitive data processing
mp.openapi.extensions.smallrye.info.contact.name=BFH DSP4D Research Team

# ===================================================================
# Health & Metrics
# ===================================================================
quarkus.smallrye-health.root-path=/health
quarkus.micrometer.export.prometheus.path=/metrics

# ===================================================================
# Development Settings
# ===================================================================
%dev.quarkus.http.port=8080
